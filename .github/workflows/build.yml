name: Samsung Stock ROM Debloat Builder

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: "Direct SamFW AP .zip or .tar.md5 link"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            lz4 p7zip-full zip unzip aria2 e2fsprogs \
            android-sdk-libsparse-utils build-essential git \
            zlib1g-dev liblz4-tool

          # simg2img & img2simg
          git clone https://github.com/anestisb/android-simg2img.git
          cd android-simg2img && make -j$(nproc) && sudo cp simg2img img2simg /usr/local/bin/ && cd ..

          # lpunpack & lpmake
          mkdir -p bin
          cd bin
          wget -q https://github.com/mkpromvp/SReStocker/raw/master/bin/lp/lpunpack -O lpunpack
          wget -q https://github.com/mkpromvp/SReStocker/raw/master/bin/lp/lpmake -O lpmake
          chmod +x lpunpack lpmake
          sudo mv lpunpack lpmake /usr/local/bin/

      - name: Download Firmware
        run: |
          mkdir -p firmware
          cd firmware
          echo "Downloading: ${{ github.event.inputs.firmware_url }}"
          aria2c -x16 -s16 --timeout=120 --connect-timeout=60 "${{ github.event.inputs.firmware_url }}"

      - name: Full Firmware Extraction (ZIP + tar.md5 + lz4)
        run: |
          cd firmware

          echo "=== Extracting ZIP files ==="
          for zipfile in *.zip; do
            if [ -f "$zipfile" ]; then
              echo "Extracting $zipfile"
              7z x -y "$zipfile" >/dev/null 2>&1
              rm -f "$zipfile"
            fi
          done

          echo "=== Extracting tar.md5 files ==="
          for tarfile in *.tar.md5 *.tar; do
            if [ -f "$tarfile" ]; then
              echo "Extracting $tarfile"
              tar -xf "$tarfile" >/dev/null 2>&1
              rm -f "$tarfile"
            fi
          done

          echo "=== Decompressing all .lz4 files ==="
          for lz4file in *.lz4; do
            if [ -f "$lz4file" ]; then
              echo "Decompressing $lz4file"
              lz4 -d "\( lz4file" " \){lz4file%.lz4}" >/dev/null 2>&1
              rm -f "$lz4file"
            fi
          done

          echo "=== Extracted files ==="
          ls -lh
          echo "Looking for super.img..."
          find . -name "*super*" -ls

      - name: Locate and Decompress SUPER
        run: |
          mkdir -p work

          SUPER_LZ4=$(find firmware -name "super.img.lz4" | head -n 1)
          SUPER_RAW=$(find firmware -name "super.img" | head -n 1)

          if [ -n "$SUPER_LZ4" ]; then
            echo "Found: $SUPER_LZ4"
            lz4 -d "$SUPER_LZ4" work/super.img
          elif [ -n "$SUPER_RAW" ]; then
            echo "Found: $SUPER_RAW"
            cp "$SUPER_RAW" work/super.img
          else
            echo "❌ super.img.lz4 or super.img not found!"
            find firmware -name "*.img*" | head -10
            exit 1
          fi

      - name: Extract Dynamic Partitions
        run: |
          mkdir -p partitions
          cd partitions
          lpunpack ../work/super.img .
          ls -lh

      - name: Convert System IMG to Raw
        run: |
          mkdir -p raw
          simg2img partitions/system.img raw/system_raw.img

      - name: Mount and Copy System
        run: |
          mkdir -p mnt extracted_system
          sudo mount -o loop raw/system_raw.img mnt
          sudo cp -a mnt/. extracted_system/
          sudo umount mnt

      - name: Run Debloat Script
        run: |
          chmod +x debloat.sh
          ./debloat.sh extracted_system

      - name: Create New System IMG
        run: |
          mkdir -p newimg temp_mount
          SIZE=$(du -sb extracted_system | cut -f1)
          SIZE=$((SIZE + 2147483648))
          echo "Final System Size = $SIZE bytes"
          truncate -s $SIZE newimg/system_new.img
          mkfs.ext4 -F newimg/system_new.img
          sudo mount -o loop newimg/system_new.img temp_mount
          sudo cp -a extracted_system/. temp_mount/
          sync
          sudo umount temp_mount

      - name: Convert to Sparse & Rebuild
        run: |
          img2simg newimg/system_new.img newimg/system.img
          cp newimg/system.img partitions/system.img

          cd partitions
          SYSTEM_SIZE=$(stat -c%s system.img)

          lpmake \
            --metadata-size 65536 \
            --super-name super \
            --metadata-slots 2 \
            --device super:9126805504 \
            --group main:9122611200 \
            --partition system:readonly:${SYSTEM_SIZE}:main \
            --image system=system.img \
            --output ../super_new.img

      - name: Compress Super
        run: |
          lz4 -B6 --content-size super_new.img super.img.lz4

      - name: Build Modified AP
        run: |
          mkdir -p final_ap
          cp firmware/* final_ap/ 2>/dev/null || true
          rm -f final_ap/super.img.lz4 final_ap/super.img
          mv super.img.lz4 final_ap/
          cd final_ap
          tar -cf AP_MODDED.tar *

      - name: Generate MD5
        run: |
          cd final_ap
          md5sum -t AP_MODDED.tar >> AP_MODDED.tar
          mv AP_MODDED.tar AP_MODDED.tar.md5

      - name: Upload Final AP
        uses: actions/upload-artifact@v4
        with:
          name: AP_MODDED
          path: final_ap/AP_MODDED.tar.md5
