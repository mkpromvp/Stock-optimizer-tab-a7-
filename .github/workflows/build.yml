name: Samsung Stock ROM Debloat Builder

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: "Direct AP.tar.md5 link"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            lz4 \
            p7zip-full \
            zip \
            unzip \
            aria2 \
            e2fsprogs \
            android-sdk-libsparse-utils \
            build-essential \
            git \
            zlib1g-dev

          # Compile simg2img and img2simg (الحل النهائي لـ Ubuntu 24.04)
          git clone https://github.com/anestisb/android-simg2img.git
          cd android-simg2img
          make
          sudo cp simg2img img2simg /usr/local/bin/
          cd ..

      - name: Download lpunpack & lpmake
        run: |
          mkdir -p bin
          cd bin
          wget -q https://github.com/LonelyFool/lpunpack_and_lpmake/releases/latest/download/lpunpack -O lpunpack
          wget -q https://github.com/LonelyFool/lpunpack_and_lpmake/releases/latest/download/lpmake -O lpmake
          chmod +x lpunpack lpmake
          sudo mv lpunpack lpmake /usr/local/bin/

      - name: Download Firmware
        run: |
          mkdir -p firmware
          cd firmware
          echo "Downloading: ${{ github.event.inputs.firmware_url }}"
          aria2c -x16 -s16 --timeout=90 --connect-timeout=30 "${{ github.event.inputs.firmware_url }}"

      - name: Extract AP
        run: |
          mkdir -p extracted
          APFILE=$(find firmware -name "*.tar.md5" -o -name "*.tar" | head -n 1)
          echo "Using AP File: $APFILE"
          cp "$APFILE" ap.tar
          tar -xf ap.tar -C extracted

      - name: Decompress SUPER
        run: |
          mkdir -p work
          if [ -f extracted/super.img.lz4 ]; then
            lz4 -d extracted/super.img.lz4 work/super.img
          elif [ -f extracted/super.img ]; then
            cp extracted/super.img work/super.img
          else
            echo "❌ super.img not found!"
            exit 1
          fi

      - name: Extract Dynamic Partitions
        run: |
          mkdir -p partitions
          cd partitions
          lpunpack ../work/super.img .
          ls -lh

      - name: Convert System IMG to Raw
        run: |
          mkdir -p raw
          simg2img partitions/system.img raw/system_raw.img

      - name: Mount and Copy System
        run: |
          mkdir -p mnt extracted_system
          sudo mount -o loop raw/system_raw.img mnt
          sudo cp -a mnt/. extracted_system/
          sudo umount mnt

      - name: Run Debloat Script
        run: |
          chmod +x debloat.sh
          ./debloat.sh extracted_system

      - name: Create New System IMG
        run: |
          mkdir -p newimg temp_mount
          SIZE=$(du -sb extracted_system | cut -f1)
          SIZE=$((SIZE + 2147483648))   # +2GB
          echo "Final System Size = $SIZE bytes"
          truncate -s $SIZE newimg/system_new.img
          mkfs.ext4 -F newimg/system_new.img
          sudo mount -o loop newimg/system_new.img temp_mount
          sudo cp -a extracted_system/. temp_mount/
          sync
          sudo umount temp_mount

      - name: Convert to Sparse Image
        run: |
          img2simg newimg/system_new.img newimg/system.img

      - name: Replace System Partition
        run: |
          cp newimg/system.img partitions/system.img

      - name: Rebuild Super IMG
        run: |
          cd partitions
          SYSTEM_SIZE=$(stat -c%s system.img)
          lpmake \
            --metadata-size 65536 \
            --super-name super \
            --metadata-slots 2 \
            --device super:9126805504 \
            --group main:9122611200 \
            --partition system:readonly:${SYSTEM_SIZE}:main \
            --image system=system.img \
            --output ../super_new.img

      - name: Compress Super
        run: |
          lz4 -B6 --content-size super_new.img super.img.lz4

      - name: Build Modified AP
        run: |
          mkdir -p final_ap
          cp extracted/* final_ap/ 2>/dev/null || true
          rm -f final_ap/super.img.lz4 final_ap/super.img
          mv super.img.lz4 final_ap/
          cd final_ap
          tar -cf AP_MODDED.tar *

      - name: Generate MD5
        run: |
          cd final_ap
          md5sum -t AP_MODDED.tar >> AP_MODDED.tar
          mv AP_MODDED.tar AP_MODDED.tar.md5

      - name: Upload Final AP
        uses: actions/upload-artifact@v4
        with:
          name: AP_MODDED
          path: final_ap/AP_MODDED.tar.md5
