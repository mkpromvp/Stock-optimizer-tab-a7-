name: Samsung Stock ROM Debloat Builder

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: "Direct SamFW AP .zip or .tar.md5 link"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            lz4 p7zip-full zip unzip aria2 e2fsprogs \
            android-sdk-libsparse-utils build-essential git \
            zlib1g-dev liblz4-tool jq curl

          # simg2img & img2simg
          git clone https://github.com/anestisb/android-simg2img.git
          cd android-simg2img && make -j$(nproc) && sudo cp simg2img img2simg /usr/local/bin/ && cd ..

          # lpunpack & lpmake
          mkdir -p bin && cd bin
          wget -q https://github.com/mkpromvp/SReStocker/raw/master/bin/lp/lpunpack -O lpunpack
          wget -q https://github.com/mkpromvp/SReStocker/raw/master/bin/lp/lpmake -O lpmake
          chmod +x lpunpack lpmake
          sudo mv lpunpack lpmake /usr/local/bin/

      - name: Download & Extract Firmware
        run: |
          mkdir -p firmware && cd firmware
          aria2c -x16 -s16 --timeout=120 "${{ github.event.inputs.firmware_url }}"
          for z in *.zip; do [ -f "$z" ] && 7z x -y "$z" >/dev/null 2>&1 && rm -f "$z"; done
          for t in *.tar.md5 *.tar; do [ -f "$t" ] && tar -xf "$t" >/dev/null 2>&1 && rm -f "$t"; done
          find . -name "*.lz4" -print0 | while IFS= read -r -d '' f; do lz4 -d "\( f" " \){f%.lz4}" 2>/dev/null && rm -f "$f" || rm -f "$f"; done

      - name: Prepare Super Image
        run: |
          mkdir -p work partitions raw
          SUPER_LZ4=$(find firmware -name "super.img.lz4" | head -n 1)
          [ -n "$SUPER_LZ4" ] && lz4 -d "$SUPER_LZ4" work/super_sparse.img
          simg2img work/super_sparse.img work/super.img || cp work/super_sparse.img work/super.img
          cd partitions && lpunpack ../work/super.img . && ls -lh

      - name: Convert & Mount System
        run: |
          simg2img partitions/system.img raw/system_raw.img || cp partitions/system.img raw/system_raw.img
          mkdir -p mnt extracted_system
          sudo mount -o loop raw/system_raw.img mnt
          sudo cp -a mnt/. extracted_system/
          sudo umount mnt
          sudo chown -R runner:runner extracted_system

      - name: Run Debloat + Verification
        run: |
          echo "=== Before Debloat ==="
          echo "Apps before: $(find extracted_system -name "*.apk" | wc -l)"
          
          chmod +x debloat.sh
          ./debloat.sh extracted_system | tee -a debloat.log
          
          echo "=== After Debloat ==="
          echo "Apps after: $(find extracted_system -name "*.apk" | wc -l)"
          echo "Size after: $(du -sh extracted_system | cut -f1)"

      - name: Create New System IMG (Fixed Size)
        run: |
          mkdir -p newimg temp_mount
          ORIGINAL_SIZE=$(stat -c%s partitions/system.img)
          SIZE=$((ORIGINAL_SIZE + 3221225472))  # +3GB
          SIZE=$(( (SIZE + 4095) / 4096 * 4096 ))

          echo "Creating new system.img with size: $SIZE bytes"
          truncate -s $SIZE newimg/system_new.img
          mkfs.ext4 -F -b 4096 newimg/system_new.img

          sudo mount -o loop newimg/system_new.img temp_mount
          sudo cp -a extracted_system/. temp_mount/
          sync
          sudo umount temp_mount

      - name: Convert to Sparse & Rebuild Super
        run: |
          img2simg newimg/system_new.img newimg/system.img
          cp newimg/system.img partitions/system.img

          cd partitions
          NEW_SYSTEM_SIZE=$(stat -c%s system.img)

          echo "Rebuilding super with new system size: $NEW_SYSTEM_SIZE"

          lpmake \
            --metadata-size 65536 \
            --super-name super \
            --metadata-slots 2 \
            --device super:9126805504 \
            --group main:9122611200 \
            --partition system:readonly:${NEW_SYSTEM_SIZE}:main \
            --image system=system.img \
            --output ../super_new.img 2>&1 | tee lpmake.log

      - name: Compress & Build Final AP
        run: |
          lz4 -B6 --content-size super_new.img super.img.lz4
          mkdir -p final_ap
          cp firmware/* final_ap/ 2>/dev/null || true
          mv super.img.lz4 final_ap/
          cd final_ap
          tar -cf AP_MODDED.tar *
          md5sum -t AP_MODDED.tar >> AP_MODDED.tar
          mv AP_MODDED.tar AP_MODDED.tar.md5

      - name: Upload to GoFile.io
        run: |
          FILE="final_ap/AP_MODDED.tar.md5"
          SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name')
          LINK=$(curl -# -F "file=@\( FILE" "https:// \){SERVER}.gofile.io/uploadFile" | jq -r '.data.downloadPage')
          echo "✅ Finished!"
          echo "🔗 Download: $LINK"
