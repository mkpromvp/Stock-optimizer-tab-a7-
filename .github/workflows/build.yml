name: Samsung Stock ROM Debloat Builder

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: "Direct SamFW AP .zip or .tar.md5 link"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            lz4 p7zip-full zip unzip aria2 e2fsprogs android-sdk-libsparse-utils \
            build-essential git zlib1g-dev liblz4-tool jq curl
          git clone https://github.com/anestisb/android-simg2img.git
          cd android-simg2img && make -j$(nproc) && sudo cp simg2img img2simg /usr/local/bin/ && cd ..
          mkdir -p bin && cd bin
          wget -q https://github.com/mkpromvp/SReStocker/raw/master/bin/lp/lpunpack -O lpunpack
          wget -q https://github.com/mkpromvp/SReStocker/raw/master/bin/lp/lpmake -O lpmake
          chmod +x lpunpack lpmake
          sudo mv lpunpack lpmake /usr/local/bin/

      - name: Download & Extract Firmware
        run: |
          mkdir -p firmware partitions
          aria2c -x16 -s16 "${{ github.event.inputs.firmware_url }}" -o firmware/firmware.zip
          cd firmware
          # فك الضغط بذكاء لأي صيغة
          7z x firmware.zip || true
          AP_FILE=$(ls AP_*)
          tar -xf "$AP_FILE" super.img.lz4 || true
          lz4 -d super.img.lz4 super.img
          echo "ORIGINAL_SUPER_SIZE=$(stat -c%s super.img)" >> $GITHUB_ENV
          lpunpack --partition system super.img ../partitions/
          cd ..

      - name: Extract System & Run Debloat
        run: |
          simg2img partitions/system.img system_raw.img || mv partitions/system.img system_raw.img
          mkdir -p extracted_system
          sudo mount -o loop system_raw.img extracted_system
          
          # تشغيل السكريبت بتاعك
          chmod +x debloat.sh
          sudo ./debloat.sh "$(pwd)/extracted_system"

      - name: Create New System IMG
        run: |
          mkdir -p newimg temp_mount
          # الحسبة المظبوطة للحجم (الفعل + 150MB بفر)
          SIZE=$(sudo du -sb extracted_system | cut -f1)
          SIZE=$((SIZE + 157286400)) 
          SIZE=$(( (SIZE + 4095) / 4096 * 4096 ))

          truncate -s $SIZE newimg/system_new.img
          mkfs.ext4 -F -b 4096 newimg/system_new.img
          sudo mount -o loop newimg/system_new.img temp_mount
          sudo cp -a extracted_system/. temp_mount/
          sync
          sudo umount temp_mount

      - name: Convert to Sparse & Rebuild Super
        run: |
          img2simg newimg/system_new.img partitions/system.img
          cd partitions
          NEW_SYSTEM_SIZE=$(stat -c%s system.img)
          
          # حساب الجروب ليكون متوافق مع حجم السوبر الأصلي
          lpmake \
            --metadata-size 65536 \
            --super-name super \
            --metadata-slots 2 \
            --device super:${ORIGINAL_SUPER_SIZE} \
            --group main:$(($ORIGINAL_SUPER_SIZE - 16777216)) \
            --partition system:readonly:${NEW_SYSTEM_SIZE}:main \
            --image system=system.img \
            --output ../super_new.img

      - name: Compress & Final AP
        run: |
          lz4 -B6 --content-size super_new.img super.img.lz4
          mkdir -p final_ap
          mv super.img.lz4 final_ap/
          cd final_ap
          tar -cf AP_MODDED.tar super.img.lz4
          md5sum -t AP_MODDED.tar >> AP_MODDED.tar
          mv AP_MODDED.tar AP_MODDED.tar.md5

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Modded_AP
          path: final_ap/AP_MODDED.tar.md5

      - name: Upload to GoFile
        run: |
          SERVER=$(curl -s https://api.gofile.io/getServer | jq -r '.data.server')
          curl -F "file=@final_ap/AP_MODDED.tar.md5" "https://$SERVER.gofile.io/uploadFile"
