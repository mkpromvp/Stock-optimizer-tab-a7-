name: Samsung Stock ROM Debloat Builder

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: "Direct SamFW AP .zip or .tar.md5 link"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            lz4 p7zip-full zip unzip aria2 e2fsprogs android-sdk-libsparse-utils \
            build-essential git zlib1g-dev liblz4-tool jq curl

          # Compile simg2img
          git clone https://github.com/anestisb/android-simg2img.git
          cd android-simg2img && make -j$(nproc) && sudo cp simg2img img2simg /usr/local/bin/ && cd ..

          # Download lpunpack & lpmake
          mkdir -p bin && cd bin
          wget -q https://github.com/mkpromvp/SReStocker/raw/master/bin/lp/lpunpack -O lpunpack
          wget -q https://github.com/mkpromvp/SReStocker/raw/master/bin/lp/lpmake -O lpmake
          chmod +x lpunpack lpmake
          sudo mv lpunpack lpmake /usr/local/bin/

      - name: Download & Extract Firmware
        run: |
          mkdir -p firmware partitions raw work
          cd firmware
          # تنزيل الملف
          aria2c -x16 -s16 --timeout=120 "${{ github.event.inputs.firmware_url }}"
          
          # فك ضغط ذكي (بيحل مشكلة الصورة 15536)
          for z in *.zip; do [ -f "$z" ] && 7z x -y "$z" >/dev/null 2>&1 && rm -f "$z"; done
          for t in *.tar.md5 *.tar; do [ -f "$t" ] && tar -xf "$t" >/dev/null 2>&1 && rm -f "$t"; done
          
          # فك ضغط الـ lz4 لو موجود
          find . -name "super.img.lz4" -print0 | while IFS= read -r -d '' f; do 
            lz4 -d "$f" ../work/super_sparse.img 2>/dev/null
          done
          
          # لو الملف نزل super.img مباشرة (بدون lz4)
          if [ ! -f "../work/super_sparse.img" ]; then
            SUPER_FILE=$(find . -name "super.img" | head -n 1)
            [ -n "$SUPER_FILE" ] && cp "$SUPER_FILE" ../work/super_sparse.img
          fi

      - name: Prepare Super Image
        run: |
          # تحويل السوبر من Sparse لـ Raw (ده بيحل خطأ الصورة 15537)
          simg2img work/super_sparse.img work/super.img || cp work/super_sparse.img work/super.img
          
          ORIGINAL_SUPER=$(stat -c%s work/super.img)
          echo "ORIGINAL_SUPER_SIZE=$ORIGINAL_SUPER" >> $GITHUB_ENV
          echo "Original Super Size: $ORIGINAL_SUPER bytes"

          cd partitions && lpunpack ../work/super.img . && ls -lh

      - name: Convert System & Mount
        run: |
          mkdir -p mnt extracted_system
          # تحويل السيستم كمان احتياطياً
          simg2img partitions/system.img raw/system_raw.img || cp partitions/system.img raw/system_raw.img
          
          sudo mount -o loop raw/system_raw.img mnt
          sudo cp -a mnt/. extracted_system/
          sudo umount mnt
          sudo chown -R runner:runner extracted_system

      - name: Run Debloat + Remove Blur
        run: |
          chmod +x debloat.sh
          echo "APKs before: $(find extracted_system -name "*.apk" | wc -l)"
          
          # تشغيل سكريبت الديبلوت
          sudo ./debloat.sh "$(pwd)/extracted_system"
          
          echo "=== Removing OneUI Blur ==="
          sudo rm -rf extracted_system/system/system/lib64/*blur* 2>/dev/null || true
          sudo rm -rf extracted_system/system/system/lib64/*gaussian* 2>/dev/null || true
          sudo find extracted_system -name "*blur*" | sudo xargs rm -rf 2>/dev/null || true

          echo "APKs after: $(find extracted_system -name "*.apk" | wc -l)"

      - name: Create New System IMG
        run: |
          mkdir -p newimg temp_mount
          # مساحة ديناميكية تمنع Error 73
          SIZE=$(sudo du -sb extracted_system | cut -f1)
          SIZE=$((SIZE + 157286400)) # إضافة 150 ميجا بفر فقط
          SIZE=$(( (SIZE + 4
